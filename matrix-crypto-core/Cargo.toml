[package]
name = "matrix-crypto-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
matrix-sdk-crypto = "0.7"
# Tokio is not needed - all APIs are synchronous
# Removed: tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uniffi = { version = "0.27", features = ["cli"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4", "serde"] }
base64 = "0.22"
rand = "0.8"
hex = "0.4"

[lib]
# Platform-specific crate types:
# - Android (aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android): cdylib (dynamic library for JNI)
# - iOS (aarch64-apple-ios, x86_64-apple-ios): staticlib (static library for linking)
# UniFFI generates bindings for both types
crate-type = ["cdylib", "staticlib"]

[build-dependencies]
uniffi = { version = "0.27", features = ["build"] }
