name: Build Matrix Crypto Bridge

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-rust:
    name: Build Rust Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-linux-android,armv7-linux-android,x86_64-linux-android
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: matrix-crypto-core/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Rust for iOS
        run: |
          cd matrix-crypto-core
          cargo build --release --target aarch64-apple-ios
          cargo build --release --target x86_64-apple-ios
      
      - name: Build Rust for Android
        run: |
          cd matrix-crypto-core
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-android
          cargo build --release --target x86_64-linux-android
      
      - name: Run tests
        run: |
          cd matrix-crypto-core
          cargo test --release

  build-ios:
    name: Build iOS Framework
    runs-on: macos-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios
      
      - name: Install uniffi-bindgen
        run: cargo install uniffi_bindgen
      
      - name: Build Rust for iOS
        run: |
          cd matrix-crypto-core
          cargo build --release --target aarch64-apple-ios
          cargo build --release --target x86_64-apple-ios
      
      - name: Generate Swift bindings
        run: |
          uniffi-bindgen generate \
            matrix-crypto-core/src/lib.rs \
            --language swift \
            --out-dir matrix-crypto-ios/generated
      
      - name: Create XCFramework
        run: ./build-scripts/build-ios.sh
      
      - name: Upload XCFramework
        uses: actions/upload-artifact@v3
        with:
          name: MatrixCryptoBridge.xcframework
          path: matrix-crypto-ios/build/MatrixCryptoBridge.xcframework

  build-android:
    name: Build Android Library
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-android,x86_64-linux-android
      
      - name: Install Android NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
      
      - name: Build Rust for Android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
        run: |
          cd matrix-crypto-core
          cargo build --release --target aarch64-linux-android
          cargo build --release --target armv7-linux-android
          cargo build --release --target x86_64-linux-android
      
      - name: Generate Kotlin bindings
        run: |
          cargo install uniffi_bindgen
          uniffi-bindgen generate \
            matrix-crypto-core/src/lib.rs \
            --language kotlin \
            --out-dir matrix-crypto-android/generated
      
      - name: Build Android AAR
        run: |
          cd matrix-crypto-android
          chmod +x ../gradlew
          ../gradlew build
      
      - name: Upload AAR
        uses: actions/upload-artifact@v3
        with:
          name: matrix-crypto-android.aar
          path: matrix-crypto-android/build/outputs/aar/

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-ios, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: |
          cd react-native-matrix-crypto
          npm install
      
      - name: Build TypeScript
        run: |
          cd react-native-matrix-crypto
          npm run build
      
      - name: Publish to npm
        run: |
          cd react-native-matrix-crypto
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
