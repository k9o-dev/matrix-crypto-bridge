name: Build and Publish to NPM (Workspace)

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - develop
      - master
  pull_request:
    branches:
      - main
      - develop
      - master
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub release after build"
        required: false
        default: "false"
      publish_npm:
        description: "Publish to NPM after build"
        required: false
        default: "false"

jobs:
  build-ios:
    name: Build iOS Libraries
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # aarch64-apple-ios       = physical device (arm64)
          # aarch64-apple-ios-sim   = Apple Silicon Mac simulator (arm64)
          # x86_64-apple-ios        = Intel Mac simulator (x86_64)
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build iOS libraries
        run: ./build-scripts/build-workspace.sh ios

      - name: Generate Swift bindings
        run: ./build-scripts/build-workspace.sh swift

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-libraries
          path: dist/ios/
          retention-days: 30

      - name: Upload Swift bindings
        uses: actions/upload-artifact@v4
        with:
          name: swift-bindings
          path: dist/swift/
          retention-days: 30

  build-android:
    name: Build Android Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26

      - name: Verify NDK Installation
        run: |
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/ || echo "NDK toolchains not found"
          which clang || echo "clang not found"

      - name: Setup Cargo NDK
        run: cargo install cargo-ndk

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Build Android libraries
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          echo "Building Android libraries..."
          unset ANDROID_NDK_ROOT  # Ensure it's unset
          ./build-scripts/build-workspace.sh android
        continue-on-error: false

      - name: Verify Android artifacts
        run: |
          echo "Checking for Android libraries..."
          find dist/android -name "*.so" -exec ls -lh {} \;
          # Verify the correct library name is produced
          SO_COUNT=$(find dist/android -name "libuniffi_matrix_crypto.so" | wc -l)
          echo "Found $SO_COUNT libuniffi_matrix_crypto.so files"
          if [ "$SO_COUNT" -lt 3 ]; then
            echo "ERROR: Expected 3 .so files (arm64, armv7, x86_64), found $SO_COUNT"
            exit 1
          fi

      - name: Generate Kotlin bindings
        run: ./build-scripts/build-workspace.sh kotlin

      - name: Upload Android artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-libraries
          path: dist/android/
          retention-days: 30

      - name: Upload Kotlin bindings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: dist/kotlin/
          retention-days: 30

  create-distribution:
    name: Create Distribution Archive
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dist directory
        run: mkdir -p dist/{ios,android,swift,kotlin}

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-libraries
          path: dist/ios/
        continue-on-error: true

      - name: Download Swift bindings
        uses: actions/download-artifact@v4
        with:
          name: swift-bindings
          path: dist/swift/
        continue-on-error: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-libraries
          path: dist/android/
        continue-on-error: true

      - name: Download Kotlin bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: dist/kotlin/
        continue-on-error: true

      - name: List distribution contents
        run: |
          echo "Distribution contents:"
          find dist -type f -exec ls -lh {} \;

      - name: Copy bindings and bridge files into dist archive
        run: |
          # 1. UniFFI-generated Swift bindings -> ios/bindings/
          #    Use CI-generated bindings from dist/swift/ (NOT from committed files,
          #    which may be stale and cause UniFFI contract version mismatch / SIGILL crash).
          mkdir -p dist/ios/bindings
          for f in matrix_crypto.swift matrix_cryptoFFI.h matrix_cryptoFFI.modulemap; do
            if [ -f "dist/swift/$f" ]; then
              cp "dist/swift/$f" "dist/ios/bindings/$f"
              echo "✓ Copied CI-generated $f from dist/swift/"
            else
              echo "⚠ $f not found in dist/swift/ — falling back to committed file"
              [ -f "react-native-matrix-crypto/ios/$f" ] && cp "react-native-matrix-crypto/ios/$f" "dist/ios/bindings/$f"
            fi
          done
          echo "Swift bindings in dist/ios/bindings/:"
          ls -lh dist/ios/bindings/

          # 2. React Native bridge files -> ios/bridge/
          # These are the files that register RNMatrixCrypto with React Native's NativeModules.
          mkdir -p dist/ios/bridge
          cp react-native-matrix-crypto/ios/MatrixCryptoBridge.swift dist/ios/bridge/
          cp react-native-matrix-crypto/ios/RNMatrixCryptoModule.swift dist/ios/bridge/
          cp react-native-matrix-crypto/ios/RNMatrixCrypto.m dist/ios/bridge/
          echo "Bridge files copied to dist/ios/bridge/:"
          ls -lh dist/ios/bridge/

          # 3. Android: Kotlin bindings and bridge files -> android/
          #    Use CI-generated Kotlin bindings from dist/kotlin/ for version consistency.
          mkdir -p dist/android/kotlin dist/android/bridge
          KOTLIN_SRC="dist/kotlin/com/matrix/crypto/matrix_crypto.kt"
          if [ -f "$KOTLIN_SRC" ]; then
            cp "$KOTLIN_SRC" dist/android/kotlin/matrix_crypto.kt
            echo "✓ Copied CI-generated Kotlin bindings"
          else
            echo "⚠ Kotlin bindings not found in dist/kotlin/"
          fi
          # Copy Android bridge files (committed, not generated)
          for f in RNMatrixCrypto.kt RNMatrixCryptoPackage.kt; do
            SRC="react-native-matrix-crypto/android/src/main/kotlin/com/matrix/crypto/$f"
            [ -f "$SRC" ] && cp "$SRC" dist/android/bridge/
          done
          echo "Android files in dist/android/:"
          find dist/android -type f -exec ls -lh {} \;

      - name: Create distribution archive
        run: |
          # Copy LICENSE to dist directory for CocoaPods
          cp LICENSE dist/

          cd dist
          tar -czf ../matrix-crypto-bridge-dist.tar.gz .
          cd ..
          sha256sum matrix-crypto-bridge-dist.tar.gz > matrix-crypto-bridge-dist.tar.gz.sha256
          echo "Archive created:"
          ls -lh matrix-crypto-bridge-dist.tar.gz*

      - name: Upload distribution archive
        uses: actions/upload-artifact@v4
        with:
          name: distribution-archive
          path: |
            matrix-crypto-bridge-dist.tar.gz
            matrix-crypto-bridge-dist.tar.gz.sha256
          retention-days: 90

  publish-release:
    name: Publish GitHub Release
    needs: create-distribution
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') && needs.create-distribution.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download distribution archive
        uses: actions/download-artifact@v4
        with:
          name: distribution-archive

      - name: Verify archive integrity
        run: |
          echo "Verifying distribution archive..."
          sha256sum -c matrix-crypto-bridge-dist.tar.gz.sha256
          echo "✓ Archive integrity verified"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            matrix-crypto-bridge-dist.tar.gz
            matrix-crypto-bridge-dist.tar.gz.sha256
          draft: false
          prerelease: false
          body: |
            # Matrix Crypto Bridge Release

            Pre-built native libraries for iOS and Android platforms.

            ## Contents
            - iOS static library bundled in the npm package (`libmatrix_crypto_ios.a`)
              - Slices: aarch64 device, aarch64 Apple Silicon simulator, x86_64 Intel simulator
            - Android shared libraries (aarch64, armv7, x86_64)
            - Swift bindings for iOS
            - Kotlin bindings for Android

            ## Installation
            ```bash
            npm install @k9o/react-native-matrix-crypto@latest
            cd ios && pod install
            ```

            No separate CocoaPods pod is required. The compiled library ships
            inside the npm package and is linked automatically via `vendored_libraries`.

            ## Verification
            ```bash
            sha256sum -c matrix-crypto-bridge-dist.tar.gz.sha256
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------------------
      # CocoaPods publish — OPTIONAL / COMMENTED OUT
      #
      # The npm package (@k9o/react-native-matrix-crypto) is self-contained:
      # libmatrix_crypto_ios.a ships inside it and is linked via vendored_libraries
      # in the podspec.  Users do NOT need a separate CocoaPods pod — they only
      # need `npm install` + `pod install` (which picks up the npm-bundled podspec).
      #
      # This step is disabled because:
      #   1. It depends on the CocoaPods CDN hitting GitHub's API, which is
      #      frequently rate-limited (429) or times out during CI runs.
      #   2. A failure here was blocking the publish-npm job downstream.
      #
      # To re-enable: uncomment the block below and ensure COCOAPODS_TRUNK_TOKEN
      # is set in the repository's production environment secrets.
      # ---------------------------------------------------------------------------
      #
      # - name: Publish MatrixCryptoBridge to CocoaPods
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   run: |
      #     echo "Publishing MatrixCryptoBridge pod to CocoaPods..."
      #     VERSION=${GITHUB_REF#refs/tags/v}
      #     SHA256=$(cat matrix-crypto-bridge-dist.tar.gz.sha256 | awk '{print $1}')
      #     sed -i "s/PLACEHOLDER_SHA256/$SHA256/" MatrixCryptoBridge.podspec
      #     gem install --user-install cocoapods
      #     export PATH="$(ruby -r rubygems -e 'puts Gem.user_dir')/bin:$PATH"
      #     pod spec lint MatrixCryptoBridge.podspec --allow-warnings --skip-import-validation
      #     pod trunk push MatrixCryptoBridge.podspec --allow-warnings --skip-import-validation
      #     echo "✓ MatrixCryptoBridge published to CocoaPods"
      #   env:
      #     COCOAPODS_TRUNK_TOKEN: ${{ secrets.COCOAPODS_TRUNK_TOKEN }}

  publish-npm:
    name: Publish to NPM
    # Depends only on create-distribution — NOT on publish-release.
    # This lets npm publish run in parallel with the GitHub release job and
    # ensures a CocoaPods failure (which is optional) never blocks npm delivery.
    needs: [create-distribution]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v') && needs.create-distribution.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download distribution archive
        uses: actions/download-artifact@v4
        with:
          name: distribution-archive

      - name: Extract distribution
        run: |
          mkdir -p dist-extracted
          tar -xzf matrix-crypto-bridge-dist.tar.gz -C dist-extracted
          echo "Distribution extracted:"
          find dist-extracted -type f -exec ls -lh {} \;

      - name: Inject iOS static library and Swift bindings into npm package
        run: |
          mkdir -p react-native-matrix-crypto/ios

          # 1. Static library — required so vendored_libraries in the podspec works.
          LIB="dist-extracted/ios/libmatrix_crypto_ios.a"
          if [ ! -f "$LIB" ]; then
            echo "ERROR: $LIB not found in distribution archive."
            echo "The iOS build job must have failed. Aborting npm publish."
            exit 1
          fi
          cp "$LIB" react-native-matrix-crypto/ios/libmatrix_crypto_ios.a
          echo "✓ Injected libmatrix_crypto_ios.a ($(du -h $LIB | cut -f1))"

          # 2. Swift bindings — MUST come from the same CI build as the .a.
          #    Using stale committed bindings causes a UniFFI contract version mismatch
          #    (different bindings_contract_version) which crashes with SIGILL at startup
          #    inside uniffiEnsureMatrixCryptoCoreInitialized().
          #    The build script copies freshly-generated bindings to dist/swift/ which
          #    ends up in the archive as dist-extracted/swift/.
          SWIFT_DIR="dist-extracted/swift"
          for f in matrix_crypto.swift matrix_cryptoFFI.h matrix_cryptoFFI.modulemap; do
            src="$SWIFT_DIR/$f"
            if [ -f "$src" ]; then
              cp "$src" react-native-matrix-crypto/ios/$f
              echo "✓ Injected CI-generated $f"
            else
              echo "ERROR: $src not found — stale committed bindings would cause SIGILL crash."
              echo "Ensure the build-ios job ran generate_swift_bindings() successfully."
              exit 1
            fi
          done

          # Show final contract version that will ship
          echo ""
          echo "UniFFI contract version in package:"
          grep "bindings_contract_version" react-native-matrix-crypto/ios/matrix_crypto.swift | head -1

      - name: Inject Android .so libraries and Kotlin bindings into npm package
        run: |
          # 1. Android shared libraries — required for Android runtime.
          #    The .so must be named libuniffi_matrix_crypto.so to match the
          #    UniFFI-generated Kotlin bindings' findLibraryName() lookup.
          ANDROID_DIR="dist-extracted/android/lib"
          JNILIBS="react-native-matrix-crypto/android/src/main/jniLibs"

          declare -A ABI_MAP=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )

          for rust_target in "${!ABI_MAP[@]}"; do
            abi="${ABI_MAP[$rust_target]}"
            src="$ANDROID_DIR/$rust_target/libuniffi_matrix_crypto.so"
            dst="$JNILIBS/$abi/"
            mkdir -p "$dst"
            if [ -f "$src" ]; then
              cp "$src" "$dst/libuniffi_matrix_crypto.so"
              echo "✓ Injected libuniffi_matrix_crypto.so for $abi ($(du -h "$src" | cut -f1))"
            else
              echo "ERROR: $src not found. Android build may have failed."
              exit 1
            fi
          done

          # 2. Kotlin bindings — MUST come from the same CI build as the .so.
          #    Using stale bindings causes UniFFI contract version mismatch at runtime.
          KOTLIN_SRC="dist-extracted/kotlin/com/matrix/crypto/matrix_crypto.kt"
          KOTLIN_DST="react-native-matrix-crypto/android/src/main/kotlin/com/matrix/crypto/"
          mkdir -p "$KOTLIN_DST"
          if [ -f "$KOTLIN_SRC" ]; then
            cp "$KOTLIN_SRC" "$KOTLIN_DST/matrix_crypto.kt"
            echo "✓ Injected CI-generated Kotlin bindings"
          else
            echo "ERROR: Kotlin bindings not found at $KOTLIN_SRC"
            exit 1
          fi

      - name: Install dependencies
        run: cd react-native-matrix-crypto && npm install

      - name: Verify package contents
        run: |
          echo "=== iOS ==="
          ls -lh react-native-matrix-crypto/ios/
          test -f react-native-matrix-crypto/ios/libmatrix_crypto_ios.a \
            && echo "✓ libmatrix_crypto_ios.a present" \
            || (echo "✗ libmatrix_crypto_ios.a MISSING" && exit 1)
          test -f react-native-matrix-crypto/ios/matrix_crypto.swift \
            && echo "✓ matrix_crypto.swift present" \
            || (echo "✗ matrix_crypto.swift MISSING" && exit 1)

          echo ""
          echo "=== Android ==="
          for abi in arm64-v8a armeabi-v7a x86_64; do
            SO="react-native-matrix-crypto/android/src/main/jniLibs/$abi/libuniffi_matrix_crypto.so"
            test -f "$SO" \
              && echo "✓ $abi/libuniffi_matrix_crypto.so present ($(du -h "$SO" | cut -f1))" \
              || (echo "✗ $abi/libuniffi_matrix_crypto.so MISSING" && exit 1)
          done
          test -f react-native-matrix-crypto/android/src/main/kotlin/com/matrix/crypto/matrix_crypto.kt \
            && echo "✓ Kotlin bindings present" \
            || (echo "✗ Kotlin bindings MISSING" && exit 1)

      - name: Publish to NPM
        run: |
          cd react-native-matrix-crypto
          npm publish --verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify NPM publication
        run: |
          echo "Waiting for NPM to index..."
          sleep 10
          npm view @k9o/react-native-matrix-crypto@latest version || echo "Package not yet indexed"

  build-status:
    name: Build Status Report
    runs-on: ubuntu-latest
    needs: [build-ios, build-android, create-distribution]
    if: always( )
    steps:
      - name: Generate Build Report
        run: |
          echo "=== Build Status Report ==="
          echo ""
          echo "iOS Build: ${{ needs.build-ios.result }}"
          echo "Android Build: ${{ needs.build-android.result }}"
          echo "Distribution: ${{ needs.create-distribution.result }}"
          echo ""

          if [[ "${{ needs.build-ios.result }}" == "success" ]]; then
            echo "✓ iOS libraries built successfully"
          else
            echo "✗ iOS build failed"
          fi

          if [[ "${{ needs.build-android.result }}" == "success" ]]; then
            echo "✓ Android libraries built successfully"
          else
            echo "⚠ Android build failed or skipped"
          fi

          if [[ "${{ needs.create-distribution.result }}" == "success" ]]; then
            echo "✓ Distribution archive created"
          else
            echo "✗ Distribution creation failed"
          fi

          echo ""
          echo "Build Summary:"
          if [[ "${{ needs.build-ios.result }}" == "success" ]]; then
            echo "- iOS: Ready for distribution"
          fi
          if [[ "${{ needs.build-android.result }}" == "success" ]]; then
            echo "- Android: Ready for distribution"
          fi

      - name: Notify on Success
        if: needs.build-ios.result == 'success' && needs.create-distribution.result == 'success'
        run: echo "✅ Build pipeline completed successfully!"

      - name: Notify on Partial Success
        if: (needs.build-ios.result == 'success' || needs.build-android.result == 'success') && needs.create-distribution.result == 'success'
        run: echo "⚠️ Build pipeline completed with some platforms built"
