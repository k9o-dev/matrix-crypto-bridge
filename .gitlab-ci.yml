# Matrix Crypto Bridge - GitLab CI/CD Pipeline
# Builds Android .so and iOS .a native libraries via build-workspace.sh

stages:
  - build
  - package
  - release

variables:
  RUST_BACKTRACE: "1"
  CARGO_TERM_COLOR: "always"

# Android Build Job
build:android:
  stage: build
  image: ubuntu:22.04

  variables:
    ANDROID_NDK_VERSION: "27.1.12297006"

  before_script:
    - apt-get update -qq
    - apt-get install -y -qq curl wget git build-essential pkg-config unzip
    # Install Rust
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source $HOME/.cargo/env
    - rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
    - cargo install cargo-ndk
    # Install Android NDK
    - mkdir -p /opt/android-ndk
    - wget -q "https://dl.google.com/android/repository/android-ndk-r27b-linux.zip" -O /tmp/ndk.zip
    - unzip -q /tmp/ndk.zip -d /opt/android-ndk
    - export ANDROID_NDK_HOME=$(find /opt/android-ndk -maxdepth 1 -type d -name 'android-ndk-*' | head -1)

  script:
    - source $HOME/.cargo/env
    - chmod +x ./build-scripts/build-workspace.sh
    - ./build-scripts/build-workspace.sh android
    - ./build-scripts/build-workspace.sh kotlin

  artifacts:
    paths:
      - dist/android/
      - dist/kotlin/
    expire_in: 30 days
    when: always

  cache:
    paths:
      - .cargo/
      - target/
    key:
      files:
        - Cargo.lock

  only:
    - branches
    - tags
    - merge_requests

  tags:
    - linux
    - docker

# iOS Build Job
build:ios:
  stage: build
  image: macos-12

  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source $HOME/.cargo/env
    - rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

  script:
    - source $HOME/.cargo/env
    - chmod +x ./build-scripts/build-workspace.sh
    - ./build-scripts/build-workspace.sh ios
    - ./build-scripts/build-workspace.sh swift

  artifacts:
    paths:
      - dist/ios/
      - dist/swift/
    expire_in: 30 days
    when: always

  cache:
    paths:
      - .cargo/
      - target/
    key:
      files:
        - Cargo.lock

  only:
    - branches
    - tags
    - merge_requests

  tags:
    - macos
    - xcode

# Package Job - Combine artifacts
package:artifacts:
  stage: package
  image: ubuntu:22.04

  dependencies:
    - build:android
    - build:ios

  script:
    - echo "Packaging build artifacts..."
    - find dist -type f -exec ls -lh {} \;

  artifacts:
    paths:
      - dist/
    expire_in: 90 days

  only:
    - tags
    - main
    - master

# Release Job
release:artifacts:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest

  dependencies:
    - package:artifacts

  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG"

  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Pre-built native libraries for iOS (.a) and Android (.so)."

  only:
    - tags

  tags:
    - linux
    - docker
