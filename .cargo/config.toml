# Cargo configuration for matrix-crypto-bridge
# Platform-specific configurations for Android and iOS

# IMPORTANT: Do NOT add global [build] rustflags - they break iOS builds
# Each target has its own configuration below

[target.aarch64-linux-android]
# ARM64 Android configuration
# Note: linker path will be resolved at build time via ANDROID_NDK_HOME
ar = "llvm-ar"
linker = "aarch64-linux-android-clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=pic",
]

[target.armv7-linux-androideabi]
# ARMv7 Android configuration
ar = "llvm-ar"
linker = "armv7a-linux-androideabi-clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=pic",
]

[target.x86_64-linux-android]
# x86_64 Android configuration
ar = "llvm-ar"
linker = "x86_64-linux-android-clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=pic",
]

[target.i686-linux-android]
# x86 Android configuration
ar = "llvm-ar"
linker = "i686-linux-android-clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-feature=+crt-static",
    "-C", "relocation-model=pic",
]

# iOS targets use default Apple toolchain - no custom configuration needed
# [target.aarch64-apple-ios] - uses default Apple linker
# [target.x86_64-apple-ios] - uses default Apple linker
